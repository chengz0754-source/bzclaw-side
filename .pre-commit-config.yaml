minimum_pre_commit_version: "4.0.0"
default_install_hook_types:
  - pre-commit
  - pre-push
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: py
        language: system
        stages:
          - pre-commit
          - pre-push
        types_or:
          - python
          - pyi
        exclude: '(^|/)(node_modules|\.next|playwright-report|test-results|\.venv[^/]*|\.pnpm-store)(/|$)'
        args:
          - "-3.12"
          - "-m"
          - "uv"
          - "run"
          - "--with"
          - "ruff"
          - "ruff"
          - "check"
          - "--force-exclude"
