root_input_glob: Market-research*.xlsx

skills:
  m01_to_m02:
    skill_dir: skill-market-route-m01-to-m02
    script: run_market_m01_to_m02.py
  step1_to_step3:
    skill_dir: skill-market-route-step1-to-step3
    script: scripts/run_market_route_pipeline.py
    default_mode: balanced

validation:
  seller_share_abnormal_rate_max: 0.01
  invalid_parse_rows_max: 0
  ratio_out_of_range_rate_max: 0.0
  accepted_quality_statuses: [PASS, WARN]
  required_fields:
    - batch_id
    - marketplace
    - dept_l1
    - parent_l2
    - niche_leaf
    - path_key
    - monthly_sales_units
    - avg_price_usd
    - product_concentration
    - new_product_share
    - avg_gross_margin
    - return_rate
    - fba_share
    - amz_share
    - fbm_share
    - seller_share_sum
    - seller_share_parse_flag
  ratio_fields:
    - fba_share
    - amz_share
    - fbm_share
    - product_concentration
    - brand_concentration
    - seller_concentration
    - new_product_share
    - avg_gross_margin
    - aplus_share
    - return_rate
    - peer_return_rate
    - primary_seller_country_share
  critical_metric_fields:
    - monthly_sales_units
    - avg_price_usd
    - product_concentration
    - new_product_share
    - avg_gross_margin
    - return_rate
  path_fields:
    - path_key
    - dept_l1
    - parent_l2
    - niche_leaf
