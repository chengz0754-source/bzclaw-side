requires_approval: true
entrypoint: scripts/ads_manual_adjustment/build_ads_bulk_file.py
inputs:
  - inputs/ads_manual_adjustment/bulk_plan.example.json
outputs:
  - outputs/ads_manual_adjustment/bulk-example.csv
